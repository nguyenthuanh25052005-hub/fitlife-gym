global:
  scrape_interval: 10s
  evaluation_interval: 10s

scrape_configs:
  - job_name: fitlife-core
    metrics_path: /metrics
    static_configs:
      - targets: ["backend:5000"]

  - job_name: fitlife-analytics
    metrics_path: /metrics
    static_configs:
      - targets: ["analytics-service:8001"]

  - job_name: fitlife-notifications
    metrics_path: /metrics
    static_configs:
      - targets: ["notification-service:8002"]

  - job_name: fitlife-memberships
    metrics_path: /metrics
    static_configs:
      - targets: ["membership-service:8003"]
