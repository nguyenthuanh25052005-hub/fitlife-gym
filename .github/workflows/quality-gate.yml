name: FitLife Level 2-3 Quality Gate

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  automated-gate:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: fitlife
          POSTGRES_USER: fitlife
          POSTGRES_PASSWORD: fitlife_secret
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U fitlife -d fitlife"
          --health-interval 5s --health-timeout 5s --health-retries 20
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Backend install and quality gate
        working-directory: backend
        run: |
          npm ci
          npm run init-db
          npm run seed
          npm run quality
      - name: PostgreSQL migration smoke check
        working-directory: backend
        env:
          DATABASE_URL: postgresql://fitlife:fitlife_secret@localhost:5432/fitlife
        run: |
          npm run init-db:postgres
          npm run seed:postgres
      - name: Frontend lint and build
        working-directory: frontend
        run: |
          npm ci
          npm run lint
          npm run build
      - name: Python service syntax and static infrastructure validation
        run: |
          python -m pip install --disable-pip-version-check pyyaml
          python -m compileall -q services
          python scripts/validate-infrastructure.py
      - name: Docker Compose validation
        run: docker compose config --quiet
      - name: SPQM structure verification
        run: node scripts/verify-spqm.js
      - uses: actions/upload-artifact@v4
        with:
          name: fitlife-quality-evidence
          path: |
            backend/coverage
            frontend/dist

  sonar-quality-gate:
    needs: automated-gate
    runs-on: ubuntu-latest
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
    steps:
      - name: Skip message when Sonar is not configured
        if: env.SONAR_TOKEN == ''
        run: echo "SONAR_TOKEN is not configured; local SonarQube evidence is required before submission."
      - uses: actions/checkout@v4
        if: env.SONAR_TOKEN != ''
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        if: env.SONAR_TOKEN != ''
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Generate coverage for SonarQube
        if: env.SONAR_TOKEN != ''
        working-directory: backend
        run: |
          npm ci
          npm run init-db
          npm run seed
          npm run test:ci
      - name: SonarQube scan and blocking quality gate
        if: env.SONAR_TOKEN != ''
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
