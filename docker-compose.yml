name: fitlife-spqm

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fitlife}
      POSTGRES_USER: ${POSTGRES_USER:-fitlife}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fitlife_secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fitlife} -d ${POSTGRES_DB:-fitlife}"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build: ./backend
    environment:
      PORT: 5000
      NODE_ENV: production
      JWT_SECRET: ${JWT_SECRET:-fitlife_docker_secret_change_me}
      JWT_EXPIRES_IN: 1d
      DB_CLIENT: postgres
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitlife}:${POSTGRES_PASSWORD:-fitlife_secret}@postgres:5432/${POSTGRES_DB:-fitlife}
      SEED_ON_START: "true"
      TZ: Asia/Ho_Chi_Minh
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:5000/api/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 20

  analytics-service:
    build: ./services/analytics-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitlife}:${POSTGRES_PASSWORD:-fitlife_secret}@postgres:5432/${POSTGRES_DB:-fitlife}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8001:8001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  notification-service:
    build: ./services/notification-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitlife}:${POSTGRES_PASSWORD:-fitlife_secret}@postgres:5432/${POSTGRES_DB:-fitlife}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  membership-service:
    build: ./services/membership-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fitlife}:${POSTGRES_PASSWORD:-fitlife_secret}@postgres:5432/${POSTGRES_DB:-fitlife}
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8003:8003"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:v2.55.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    volumes:
      - ./infra/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - backend
      - analytics-service
      - notification-service
      - membership-service

  grafana:
    image: grafana/grafana:11.4.0
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3001:3000"
    volumes:
      - ./infra/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  sonarqube:
    image: sonarqube:community
    profiles: ["quality"]
    environment:
      SONAR_ES_BOOTSTRAP_CHECKS_DISABLE: "true"
    ports:
      - "9000:9000"
    volumes:
      - sonar_data:/opt/sonarqube/data
      - sonar_logs:/opt/sonarqube/logs
      - sonar_extensions:/opt/sonarqube/extensions

  k6:
    image: grafana/k6:0.54.0
    profiles: ["loadtest"]
    environment:
      BASE_URL: http://backend:5000
    volumes:
      - ./tests/k6:/scripts:ro
    command: ["run", "/scripts/payment-flow.js"]
    depends_on:
      backend:
        condition: service_healthy

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  sonar_data:
  sonar_logs:
  sonar_extensions:
