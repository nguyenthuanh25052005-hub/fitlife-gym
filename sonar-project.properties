sonar.projectKey=fitlife-gym
sonar.host.url=http://localhost:9000
sonar.projectName=FitLife Gym
sonar.sourceEncoding=UTF-8
sonar.sources=backend/src,frontend/src,services
sonar.tests=backend/tests
sonar.test.inclusions=backend/tests/**/*.js
sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/__pycache__/**
# Jest measures the Node.js core API. Frontend and Python services remain in the
# static-analysis scope but are excluded from the JavaScript coverage metric.
sonar.coverage.exclusions=frontend/**,services/**,backend/src/server.js,backend/src/database/init*.js,backend/src/database/seed*.js,backend/src/database/postgresDb.js
sonar.qualitygate.wait=true
